    <style>
      /* ── SHARED DESIGN TOKENS ─────────────────── */
      :root {
        --bg: #f7f5f0;
        --bg2: #edeae3;
        --bg3: #e3dfd7;
        --surface: rgba(255, 255, 255, 0.55);
        --surface-border: rgba(200, 196, 188, 0.45);
        --ink: #0e0e0c;
        --ink2: #4a4840;
        --ink3: #9a9690;
        --accent: #0e0e0c;
        --accent2: #8b5e3c;
        --accent2l: #c49a72;
        --glass-nav: rgba(247, 245, 240, 0.78);
        --glass-card: rgba(255, 255, 255, 0.52);
        --shadow: 0 12px 56px rgba(14, 14, 12, 0.12);
        --shadow-sm: 0 2px 16px rgba(14, 14, 12, 0.07);
        --ff-d: "Bebas Neue", sans-serif;
        --ff-s: "Instrument Serif", Georgia, serif;
        --ff-b: "Epilogue", sans-serif;
        --ease: cubic-bezier(0.22, 1, 0.36, 1);
      }
      [data-theme="dark"] {
        --bg: #0e0e0c;
        --bg2: #1a1a17;
        --bg3: #222220;
        --surface: rgba(30, 30, 26, 0.6);
        --surface-border: rgba(255, 255, 255, 0.08);
        --ink: #f7f5f0;
        --ink2: #b8b4ac;
        --ink3: #6a6660;
        --accent: #f7f5f0;
        --accent2: #c49a72;
        --accent2l: #d4aa82;
        --glass-nav: rgba(14, 14, 12, 0.82);
        --glass-card: rgba(26, 26, 23, 0.65);
        --shadow: 0 12px 56px rgba(0, 0, 0, 0.45);
        --shadow-sm: 0 2px 16px rgba(0, 0, 0, 0.3);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
        font-size: 16px;
      }
      body {
        font-family: var(--ff-b);
        background: var(--bg);
        color: var(--ink);
        overflow-x: hidden;
        transition:
          background 0.4s,
          color 0.4s;
        line-height: 1.6;
      }
      ::-webkit-scrollbar {
        width: 3px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--accent2);
        border-radius: 2px;
      }
      img {
        display: block;
        max-width: 100%;
      }
      a {
        text-decoration: none;
        color: inherit;
      }

      /* ── UTILITIES ─────────────────────────────── */
      .s-label {
        font-family: var(--ff-b);
        font-size: 0.7rem;
        font-weight: 400;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: var(--accent2);
        display: flex;
        align-items: center;
        gap: 0.7rem;
        margin-bottom: 0.8rem;
      }

      .reveal {
        opacity: 0;
        transform: translateY(1.6rem);
        transition:
          opacity 0.8s var(--ease),
          transform 0.8s var(--ease);
      }
      .reveal.in {
        opacity: 1;
        transform: none;
      }
      .d1 {
        transition-delay: 0.1s;
      }
      .d2 {
        transition-delay: 0.2s;
      }
      .d3 {
        transition-delay: 0.3s;
      }
      .d4 {
        transition-delay: 0.4s;
      }
      .btn {
        font-family: var(--ff-b);
        font-size: 0.72rem;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 0.8rem 1.8rem;
        border-radius: 100px;
        transition: all 0.25s;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        border: none;
      }
      .btn-solid {
        background: var(--ink);
        color: var(--bg);
      }
      .btn-solid:hover {
        background: var(--accent2);
        transform: translateY(-2px);
      }
      .btn-ghost {
        background: transparent;
        color: var(--ink);
        border: 0.5px solid var(--ink3);
      }
      .btn-ghost:hover {
        border-color: var(--accent2);
        color: var(--accent2);
        transform: translateY(-2px);
      }
      .btn-brown {
        background: var(--accent2);
        color: #fff;
      }
      .btn-brown:hover {
        background: var(--accent2l);
        transform: translateY(-2px);
      }

      /* ── CASE STUDY ───────────────────────────── */
      .cs-wrap {
        padding-top: 5rem;
      }

      /* HERO */
      .cs-hero {
        position: relative;
        height: 70vh;
        min-height: 460px;
        overflow: hidden;
        display: flex;
        align-items: flex-end;
      }
      .cs-hero-bg {
        position: absolute;
        inset: 0;
        background-size: cover;
        background-position: center 20%;
        transition: transform 6s ease;
      }
      .cs-hero-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          rgba(14, 14, 12, 0.1) 0%,
          rgba(14, 14, 12, 0.8) 100%
        );
      }
      .cs-hero-content {
        position: relative;
        z-index: 2;
        width: 100%;
        padding: 0 5vw 3.5rem;
      }
      .cs-back {
        position: absolute;
        top: 2rem;
        left: 5vw;
        z-index: 10;
        font-family: var(--ff-b);
        font-size: 0.72rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: rgba(247, 245, 240, 0.7);
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        transition: color 0.2s;
      }
      .cs-back:hover {
        color: #fff;
      }
      .cs-back svg {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.5;
      }
      .cs-hero-cat {
        font-family: var(--ff-b);
        font-size: 0.7rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--accent2);
        margin-bottom: 0.8rem;
      }
      .cs-hero-title {
        font-family: var(--ff-d);
        font-size: clamp(3rem, 7vw, 8rem);
        line-height: 0.92;
        color: #f7f5f0;
        letter-spacing: -0.01em;
        margin-bottom: 1rem;
      }
      .cs-hero-sub {
        font-family: var(--ff-b);
        font-size: 1rem;
        font-weight: 300;
        color: rgba(247, 245, 240, 0.65);
        max-width: 52ch;
        line-height: 1.75;
        /* white-space: nowrap; */
        /* overflow: hidden; */
        /* text-overflow: ellipsis; */
        /* max-width: 300px; */
      }

      .truncate-multi {
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      /* META BAR */
      .cs-meta-bar {
        background: var(--bg2);
        padding: 2rem 5vw;
        display: flex;
        gap: 3rem;
        flex-wrap: wrap;
        border-bottom: 0.5px solid var(--surface-border);
      }
      .cs-meta-item {
      }
      .cs-meta-label {
        font-family: var(--ff-b);
        font-size: 0.65rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--ink3);
        margin-bottom: 0.25rem;
      }
      .cs-meta-val {
        font-family: var(--ff-b);
        font-size: 0.9rem;
        font-weight: 400;
        color: var(--ink);
      }

      /* BODY */
      .cs-body {
        max-width: 1100px;
        margin: 0 auto;
        padding: 5rem 5vw 8rem;
      }
      .cs-section {
        margin-bottom: 5rem;
      }
      .cs-section-title {
        font-family: var(--ff-d);
        font-size: clamp(2rem, 4vw, 4rem);
        color: var(--ink);
        margin-bottom: 1.5rem;
        line-height: 1;
      }

      /* PROBLEM / SOLUTION 2-col */
      .cs-ps-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2px;
        margin: 3rem 0;
      }
      .cs-ps-col {
        padding: 2.5rem;
        background: var(--bg2);
        border: 0.5px solid var(--surface-border);
      }
      .cs-ps-col.solution {
        background: var(--ink);
        color: var(--bg);
      }
      .cs-ps-label {
        font-family: var(--ff-b);
        font-size: 0.68rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--accent2);
        margin-bottom: 0.8rem;
      }
      .cs-ps-col.solution .cs-ps-label {
        color: var(--accent2l);
      }
      .cs-ps-text {
        font-family: var(--ff-s);
        font-style: italic;
        font-size: 1.05rem;
        line-height: 1.85;
      }
      .cs-ps-col.solution .cs-ps-text {
        color: rgba(247, 245, 240, 0.8);
      }

      /* IMAGE GALLERY */
      .cs-gallery {
        columns: 3 280px;
        column-gap: 1rem;
        margin: 2rem 0;
      }
      .cs-gallery-item {
        break-inside: avoid;
        margin-bottom: 1rem;
        overflow: hidden;
        cursor: zoom-in;
        position: relative;
      }
      .cs-gallery-item img {
        width: 100%;
        display: block;
        transition:
          transform 0.5s var(--ease),
          filter 0.4s;
        filter: brightness(0.95);
      }
      .cs-gallery-item:hover img {
        transform: scale(1.03);
        filter: brightness(0.85);
      }
      .cs-gallery-item::after {
        content: "↗";
        position: absolute;
        top: 0.6rem;
        right: 0.6rem;
        font-size: 0.8rem;
        color: #fff;
        background: rgba(14, 14, 12, 0.4);
        backdrop-filter: blur(8px);
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        opacity: 0;
        transition: opacity 0.3s;
      }
      .cs-gallery-item:hover::after {
        opacity: 1;
      }

      /* CTA */
      .cs-cta-row {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        padding: 3rem 0;
        border-top: 0.5px solid var(--surface-border);
        margin-top: 4rem;
      }

      /* NAV BETWEEN PROJECTS */
      .cs-nav-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.2rem;
        padding: 3rem 5vw;
        background: var(--bg2);
        border-top: 0.5px solid var(--surface-border);
      }
      .cs-nav-card {
        background: var(--bg);
        padding: 1.8rem;
        border: 0.5px solid var(--surface-border);
        transition: all 0.3s var(--ease);
        cursor: pointer;
      }
      .cs-nav-card:hover {
        background: var(--bg2);
        transform: translateY(-2px);
        box-shadow: var(--shadow-sm);
      }
      .cs-nav-dir {
        font-family: var(--ff-b);
        font-size: 0.65rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--ink3);
        margin-bottom: 0.4rem;
      }
      .cs-nav-title {
        font-family: var(--ff-d);
        font-size: 1.6rem;
        color: var(--ink);
        line-height: 1;
      }

      /* LIGHTBOX */
      #lightbox {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: rgba(14, 14, 12, 0.95);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
      }
      #lightbox.open {
        opacity: 1;
        pointer-events: all;
      }
      #lightbox img {
        max-width: 90vw;
        max-height: 88vh;
        object-fit: contain;
        transform: scale(0.96);
        transition: transform 0.35s var(--ease);
      }
      #lightbox.open img {
        transform: scale(1);
      }
      #lb-close {
        position: absolute;
        top: 1.5rem;
        right: 1.5rem;
        font-family: var(--ff-b);
        font-size: 0.75rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: rgba(247, 245, 240, 0.5);
        background: none;
        border: none;
        cursor: pointer;
        transition: color 0.2s;
      }
      #lb-close:hover {
        color: #fff;
      }

      @media (max-width: 760px) {
        .cs-ps-grid {
          grid-template-columns: 1fr;
        }
        .cs-gallery {
          columns: 2 160px;
        }
        .cs-hero {
          height: 55vh;
        }
        .cs-meta-bar {
          gap: 1.5rem;
        }
        .cs-nav-row {
          grid-template-columns: 1fr;
        }
        .cs-body {
          padding: 3rem 4vw 5rem;
        }
      }
    </style>
  </head>

      function getParam(key) {
        return new URLSearchParams(window.location.search).get(key);
      }

      function loadProject() {
        var id = getParam("p");
        var idx = PROJECTS.findIndex(function (p) {
          return p.id === id;
        });
        if (idx < 0) {
          window.location.href = "works.html";
          return;
        }
        var p = PROJECTS[idx];

        document.title = p.title + " — Oluwatobi Oyesola";

        document.getElementById("csBg").style.backgroundImage = "url(" + p.hero + ")";
        document.getElementById("csCat").textContent = p.category;
        document.getElementById("csTitle").textContent = p.title;
        document.getElementById("csSub").textContent = p.short;
        document.getElementById("csRole").textContent = p.role;
        document.getElementById("csTools").textContent = p.tools;
        document.getElementById("csOverview").textContent = p.short;

        // Gallery
        var gallery = document.getElementById("csGallery");
        gallery.innerHTML = "";
        p.imgs.forEach(function (src) {
          var div = document.createElement("div");
          div.className = "cs-gallery-item";
          var img = document.createElement("img");
          img.src = src;
          img.alt = p.title;
          img.loading = "lazy";
          img.addEventListener("click", function () {
            openLightbox(src);
          });
          div.appendChild(img);
          gallery.appendChild(div);
        });

        // CTA
        var cta = document.getElementById("csCtaRow");
        cta.innerHTML = "";
        if (p.has_links && p.live) {
          cta.innerHTML +=
            '<a href="' +
            p.live +
            '" target="_blank" class="btn btn-brown">View Live Project ↗</a>';
        }
        cta.innerHTML +=
          '<a href="works.html" class="btn btn-ghost">← Back to All Works</a>';

        // Prev/Next nav
        var prev = PROJECTS[(idx - 1 + PROJECTS.length) % PROJECTS.length];
        var next = PROJECTS[(idx + 1) % PROJECTS.length];
        document.getElementById("csNavRow").innerHTML =
          '<a class="cs-nav-card" href="case-study.html?p=' +
          prev.id +
          '">' +
          '<div class="cs-nav-dir">← Previous</div>' +
          '<div class="cs-nav-title">' +
          prev.title +
          "</div></a>" +
          '<a class="cs-nav-card" href="case-study.html?p=' +
          next.id +
          '" style="text-align:right">' +
          '<div class="cs-nav-dir">Next →</div>' +
          '<div class="cs-nav-title">' +
          next.title +
          "</div></a>";

        // parallax
        window.addEventListener(
          "scroll",
          function () {
            var bg = document.getElementById("csBg");
            if (window.scrollY < window.innerHeight)
              bg.style.transform = "translateY(" + window.scrollY * 0.3 + "px)";
          },
          { passive: true },
        );
      }

      // Lightbox
      function openLightbox(src) {
        var lb = document.getElementById("lightbox");
        document.getElementById("lb-img").src = src;
        lb.classList.add("open");
        document.body.style.overflow = "hidden";
      }
      document
        .getElementById("lb-close")
        .addEventListener("click", function () {
          document.getElementById("lightbox").classList.remove("open");
          document.body.style.overflow = "";
        });
      document
        .getElementById("lightbox")
        .addEventListener("click", function (e) {
          if (e.target === this) {
            this.classList.remove("open");
            document.body.style.overflow = "";
          }
        });
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") {
          document.getElementById("lightbox").classList.remove("open");
          document.body.style.overflow = "";
        }
      });

      loadProject();
    </script>
